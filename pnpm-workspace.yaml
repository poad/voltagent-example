packages:
  - server
  - client

allowBuilds:
  esbuild: false
  protobufjs: false

blockExoticSubdeps: true

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - got@11.8.5
  - axios@0.28.0
  - axios@0.30.0
  - axios@0.30.3
  - axios@0.31.0
  - axios@0.31.1
  - ip-address@10.1.1

overrides:
  axios@<0.30.0: ^0.30.0
  axios@<0.31.0: ^0.31.0
  axios@<=0.30.2: ^0.30.3
  axios@<=0.31.0: ^0.31.1
  axios@>=0.8.1 <0.28.0: ^0.28.0
  eslint-import-resolver-typescript: '^4.4.4'
  got@<11.8.5: ^11.8.5
  ip-address@<=10.1.0: ^10.1.1
  pino: '^10'
  semver: '>=7'
  uuid: ^14.0.0

strictPeerDependencies: false

trustPolicy: no-downgrade
